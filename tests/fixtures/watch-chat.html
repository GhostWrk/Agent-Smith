<!doctype html>
<html>
<head><meta charset="utf-8"><title>Watch Chat</title></head>
<body>
  <h1>Chat with Reefer</h1>
  <div id="thread">Reefer is online.</div>
  <div id="composer" contenteditable="true" role="textbox" aria-label="Message Reefer"></div>
  <script>
    // Composer: Enter sends, appending "You: <msg>" (rich-editor model, like Messenger).
    var model = '';
    var c = document.getElementById('composer'), thread = document.getElementById('thread');
    c.addEventListener('input', function (e) {
      if (e.inputType === 'insertText' && e.data != null) model += e.data;
      else if (e.inputType === 'deleteContentBackward') model = model.slice(0, -1);
    });
    c.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      if (!model.trim().length) return;
      thread.textContent += '\nYou: ' + model;
      model = ''; c.textContent = '';
    });
    // Test hook: simulate an incoming message from the other person.
    window.__incoming = function (text) { thread.textContent += '\nReefer: ' + text; };
  </script>
</body>
</html>
