<!doctype html>
<html>
<head><meta charset="utf-8"><title>Login</title></head>
<body>
  <h1>Sign in</h1>
  <form id="lf">
    <input id="user" name="username" placeholder="username">
    <input id="pass" name="password" type="password" placeholder="password">
    <button id="li" type="submit">Log in</button>
  </form>
  <div id="status">logged out</div>
  <script>
    document.getElementById('lf').addEventListener('submit', function (e) {
      e.preventDefault();
      var u = document.getElementById('user').value;
      var p = document.getElementById('pass').value;
      document.getElementById('status').textContent = 'LOGGED IN as ' + u + ' pwlen=' + p.length;
    });
  </script>
</body>
</html>
